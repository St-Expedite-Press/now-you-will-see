  <text x="289" y="255" font-size="11" fill="#555">7</text>
  <text x="289" y="273" font-size="11" fill="#555">8</text>
  <text x="307" y="273" font-size="11" fill="#d4d4d4">The girl at the crossing won't let me pass—</text>
  <text x="289" y="289" font-size="11" fill="#555">9</text>
  <text x="307" y="289" font-size="11" fill="#d4d4d4">her hem red-dipped in the ditch's bleed.</text>
  <text x="289" y="305" font-size="11" fill="#555">10</text>
  <text x="289" y="321" font-size="11" fill="#555">11</text>
  <text x="307" y="321" font-size="11" fill="#d4d4d4">*Mayday, mayday—* who set this fire?</text>
  <text x="289" y="337" font-size="11" fill="#555">12</text>
  <text x="307" y="337" font-size="11" fill="#d4d4d4">The engine red, the crossing wrong,</text>
