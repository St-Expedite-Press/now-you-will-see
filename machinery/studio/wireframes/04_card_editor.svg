  <text x="289" y="369" font-size="11" fill="#555">14</text>
  <text x="307" y="369" font-size="11" fill="#d4d4d4">I said no. I said: not here, not now.</text>
  <text x="289" y="385" font-size="11" fill="#555">15</text>
  <text x="307" y="385" font-size="11" fill="#d4d4d4">She laughed like a screen door catches wind.</text>

