<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="'Courier New', monospace">

  <rect width="1200" height="780" fill="#0c0c14"/>

  <!-- ═══════════════════════════════════ -->
  <!-- TOP BAR — agent mode               -->
  <!-- ═══════════════════════════════════ -->
  <rect x="0" y="0" width="1200" height="40" fill="#111118"/>
  <text x="16" y="25" font-size="14" fill="#40916c">⬡</text>
  <text x="34" y="25" font-size="13" font-weight="bold" fill="#e0e0e0">Texgraph</text>
  <text x="180" y="25" font-size="11" fill="#555">New project setup</text>

  <!-- Agent mode indicator (active) -->
  <rect x="700" y="7" width="200" height="27" rx="4" fill="#1a1a38" stroke="#4444aa" stroke-width="1.5"/>
  <text x="800" y="24" font-size="12" text-anchor="middle" fill="#9999ee">⬡  Agent  ·  Setup Mode</text>

  <!-- Collapse to editor / skip -->
  <rect x="916" y="8" width="120" height="25" rx="4" fill="#161616" stroke="#2a2a2a"/>
  <text x="976" y="24" font-size="11" text-anchor="middle" fill="#555">Skip → Editor</text>
  <rect x="1044" y="8" width="110" height="25" rx="4" fill="#161616" stroke="#2a2a2a"/>
  <text x="1099" y="24" font-size="11" text-anchor="middle" fill="#555">Manual config</text>

  <!-- ═══════════════════════════════════ -->
  <!-- LEFT CONTEXT PANEL (x=0, w=280)    -->
  <!-- ═══════════════════════════════════ -->
  <rect x="0" y="40" width="280" height="740" fill="#0e0e1c"/>
  <rect x="0" y="40" width="280" height="32" fill="#12121e"/>
  <text x="14" y="61" font-size="11" fill="#6666aa" letter-spacing="1">PROJECT BEING BUILT</text>

  <!-- Live structure preview -->
  <rect x="12" y="80" width="256" height="530" rx="4" fill="#0c0c18" stroke="#22224a" stroke-width="1"/>

  <!-- Collection block -->
  <text x="24" y="106" font-size="10" fill="#5555aa" letter-spacing="1">COLLECTION</text>
  <rect x="24" y="112" width="232" height="1" fill="#22224a"/>

  <!-- Title confirmed -->
  <text x="32" y="134" font-size="11" fill="#4ade80">✓</text>
  <text x="46" y="134" font-size="11" fill="#888">title</text>
  <text x="32" y="150" font-size="12" fill="#d4d4d4" font-weight="bold">Lift Wind / Love Heat</text>

  <!-- Author confirmed -->
  <text x="32" y="172" font-size="11" fill="#4ade80">✓</text>
  <text x="46" y="172" font-size="11" fill="#888">author</text>
  <text x="32" y="188" font-size="12" fill="#d4d4d4">Eleanor Voss Hartley</text>

  <!-- Year confirmed -->
  <text x="32" y="210" font-size="11" fill="#4ade80">✓</text>
  <text x="46" y="210" font-size="11" fill="#888">year</text>
  <text x="32" y="226" font-size="12" fill="#d4d4d4">2025</text>

  <!-- Sections — in progress -->
  <rect x="24" y="240" width="232" height="1" fill="#22224a"/>
  <text x="24" y="258" font-size="10" fill="#5555aa" letter-spacing="1">SECTIONS</text>
  <text x="32" y="278" font-size="11" fill="#f59e0b">⋯</text>
  <text x="46" y="278" font-size="11" fill="#888">defining structure...</text>

  <!-- Placeholder section rows -->
  <rect x="32" y="286" width="212" height="20" rx="3" fill="#14142e" stroke="#22224a" stroke-dasharray="3,2"/>
  <text x="40" y="300" font-size="10" fill="#333" font-style="italic">section 1 — pending</text>
  <rect x="32" y="310" width="212" height="20" rx="3" fill="#14142e" stroke="#22224a" stroke-dasharray="3,2"/>
  <text x="40" y="324" font-size="10" fill="#333" font-style="italic">section 2 — pending</text>
  <rect x="32" y="334" width="212" height="20" rx="3" fill="#14142e" stroke="#22224a" stroke-dasharray="3,2"/>
  <text x="40" y="348" font-size="10" fill="#333" font-style="italic">section 3 — pending</text>
  <text x="40" y="372" font-size="10" fill="#2a2a4a" font-style="italic">…</text>

  <!-- Build config — pending -->
  <rect x="24" y="388" width="232" height="1" fill="#22224a"/>
  <text x="24" y="406" font-size="10" fill="#5555aa" letter-spacing="1">BUILD CONFIG</text>
  <text x="32" y="426" font-size="11" fill="#333">○  LaTeX path</text>
  <text x="32" y="444" font-size="11" fill="#333">○  Paper size</text>
  <text x="32" y="462" font-size="11" fill="#333">○  Font</text>

  <!-- Content import — pending -->
  <rect x="24" y="476" width="232" height="1" fill="#22224a"/>
  <text x="24" y="494" font-size="10" fill="#5555aa" letter-spacing="1">INITIAL CONTENT</text>
  <text x="32" y="514" font-size="11" fill="#333">○  Import poems</text>
  <text x="32" y="532" font-size="11" fill="#333">○  Generate scaffolding</text>

  <!-- Progress indicator -->
  <rect x="12" y="624" width="256" height="8" rx="4" fill="#14142e"/>
  <rect x="12" y="624" width="86" height="8" rx="4" fill="#4f4f99"/>
  <text x="140" y="650" font-size="10" text-anchor="middle" fill="#5555aa">Step 2 of 5  ·  Sections</text>

  <!-- Action buttons -->
  <rect x="12" y="664" width="256" height="28" rx="4" fill="#14142e" stroke="#22224a"/>
  <text x="140" y="682" font-size="11" text-anchor="middle" fill="#444">Export collection.yaml</text>
  <rect x="12" y="698" width="256" height="28" rx="4" fill="#141414" stroke="#222"/>
  <text x="140" y="716" font-size="11" text-anchor="middle" fill="#333">Start over</text>

  <!-- Panel divider -->
  <rect x="280" y="40" width="1" height="740" fill="#22224a"/>

  <!-- ═══════════════════════════════════ -->
  <!-- CHAT AREA (x=281, w=919)           -->
  <!-- ═══════════════════════════════════ -->
  <rect x="281" y="40" width="919" height="740" fill="#0e0e18"/>

  <!-- Agent header strip -->
  <rect x="281" y="40" width="919" height="44" fill="#111120"/>
  <rect x="281" y="84" width="919" height="1" fill="#1e1e3a"/>
  <text x="299" y="60" font-size="18" fill="#8888dd">⬡</text>
  <text x="323" y="60" font-size="13" font-weight="bold" fill="#ccccee">Texgraph Agent</text>
  <text x="323" y="75" font-size="10" fill="#5555aa">Setup mode  ·  claude-sonnet-4-6  ·  Context: new project</text>

  <!-- Clear / help -->
  <text x="1180" y="66" font-size="11" text-anchor="end" fill="#3a3a5a">Clear</text>

  <!-- ── AGENT MESSAGE 1 ── -->
  <rect x="297" y="96" width="680" height="86" rx="6" fill="#131328" stroke="#2a2a5a" stroke-width="1"/>
  <text x="313" y="116" font-size="11" fill="#8888cc">⬡  Texgraph Agent</text>
  <text x="313" y="136" font-size="12" fill="#d4d4d4">Hello! I'm here to help you set up your poetry collection.</text>
  <text x="313" y="154" font-size="12" fill="#d4d4d4">What's the working title, and is this a new collection</text>
  <text x="313" y="170" font-size="12" fill="#d4d4d4">or one you're importing from existing files?</text>
  <text x="968" y="114" font-size="10" fill="#3a3a5a" text-anchor="end">14:28</text>

  <!-- ── USER MESSAGE 1 ── -->
  <rect x="580" y="198" width="600" height="66" rx="6" fill="#1a2a1a" stroke="#2d6a4f" stroke-width="1"/>
  <text x="598" y="218" font-size="11" fill="#4ade80">You</text>
  <text x="598" y="238" font-size="12" fill="#d4d4d4">A new collection — a decade of work. Working title</text>
  <text x="598" y="256" font-size="12" fill="#d4d4d4">is 'Lift Wind / Love Heat'.</text>
  <text x="1162" y="216" font-size="10" fill="#333" text-anchor="end">14:28</text>

  <!-- ── AGENT MESSAGE 2 (with info card) ── -->
  <rect x="297" y="280" width="680" height="128" rx="6" fill="#131328" stroke="#2a2a5a" stroke-width="1"/>
  <text x="313" y="300" font-size="11" fill="#8888cc">⬡  Texgraph Agent</text>
  <text x="313" y="320" font-size="12" fill="#d4d4d4">Great. I've recorded the title.</text>
  <!-- Inline info card -->
  <rect x="313" y="328" width="290" height="30" rx="3" fill="#0a0a20" stroke="#2a2a5a"/>
  <text x="323" y="347" font-size="11" fill="#9999cc">title: "Lift Wind / Love Heat"  ✓</text>
  <!-- Continue message -->
  <text x="313" y="376" font-size="12" fill="#d4d4d4">Who is the author, and what year should we</text>
  <text x="313" y="394" font-size="12" fill="#d4d4d4">use as the publication year?</text>
  <text x="968" y="298" font-size="10" fill="#3a3a5a" text-anchor="end">14:28</text>

  <!-- ── USER MESSAGE 2 ── -->
  <rect x="580" y="424" width="600" height="46" rx="6" fill="#1a2a1a" stroke="#2d6a4f" stroke-width="1"/>
  <text x="598" y="444" font-size="11" fill="#4ade80">You</text>
  <text x="598" y="458" font-size="12" fill="#d4d4d4">Eleanor Voss Hartley, 2025</text>
  <text x="1162" y="442" font-size="10" fill="#333" text-anchor="end">14:29</text>

  <!-- ── AGENT MESSAGE 3 (with action chips) ── -->
  <rect x="297" y="486" width="680" height="164" rx="6" fill="#131328" stroke="#2a2a5a" stroke-width="1"/>
  <text x="313" y="506" font-size="11" fill="#8888cc">⬡  Texgraph Agent</text>
  <!-- Compact info card -->
  <rect x="313" y="514" width="390" height="36" rx="3" fill="#0a0a20" stroke="#2a2a5a"/>
  <text x="323" y="530" font-size="10" fill="#9999cc">title: "Lift Wind / Love Heat"  ✓  ·  author: "Eleanor Voss Hartley"  ✓</text>
  <text x="323" y="545" font-size="10" fill="#9999cc">year: 2025  ✓</text>

  <text x="313" y="566" font-size="12" fill="#d4d4d4">Now let's structure the collection. How many sections or</text>
  <text x="313" y="582" font-size="12" fill="#d4d4d4">movements does it have? Describe the arc, or paste</text>
  <text x="313" y="598" font-size="12" fill="#d4d4d4">section titles if you have them.</text>

  <!-- Action chips -->
  <rect x="313" y="614" width="138" height="26" rx="13" fill="#1a1a38" stroke="#4444aa" stroke-width="1"/>
  <text x="382" y="631" font-size="11" text-anchor="middle" fill="#9999ee">Describe the arc</text>
  <rect x="459" y="614" width="136" height="26" rx="13" fill="#1a1a38" stroke="#4444aa" stroke-width="1"/>
  <text x="527" y="631" font-size="11" text-anchor="middle" fill="#9999ee">Paste section titles</text>
  <rect x="603" y="614" width="148" height="26" rx="13" fill="#1a2a1a" stroke="#2d6a4f" stroke-width="1"/>
  <text x="677" y="631" font-size="11" text-anchor="middle" fill="#4ade80">Import existing files</text>
  <text x="968" y="504" font-size="10" fill="#3a3a5a" text-anchor="end">14:29</text>

  <!-- ── TYPING INDICATOR ── -->
  <rect x="297" y="666" width="160" height="32" rx="6" fill="#131328" stroke="#2a2a5a" stroke-width="1"/>
  <text x="313" y="679" font-size="10" fill="#5555aa">You are typing...</text>
  <text x="313" y="693" font-size="11" fill="#888">Three main movements —</text>

  <!-- ── INPUT BAR ── -->
  <rect x="281" y="704" width="919" height="76" fill="#111120"/>
  <rect x="281" y="704" width="919" height="1" fill="#1e1e3a"/>

  <!-- Quick action chips above input -->
  <rect x="297" y="712" width="100" height="18" rx="9" fill="#0e0e1c" stroke="#2a2a4a"/>
  <text x="347" y="724" font-size="10" text-anchor="middle" fill="#555">Add section</text>
  <rect x="403" y="712" width="108" height="18" rx="9" fill="#0e0e1c" stroke="#2a2a4a"/>
  <text x="457" y="724" font-size="10" text-anchor="middle" fill="#555">Import poems</text>
  <rect x="517" y="712" width="120" height="18" rx="9" fill="#0e0e1c" stroke="#2a2a4a"/>
  <text x="577" y="724" font-size="10" text-anchor="middle" fill="#555">Config LaTeX</text>
  <rect x="643" y="712" width="96" height="18" rx="9" fill="#0e0e1c" stroke="#2a2a4a"/>
  <text x="691" y="724" font-size="10" text-anchor="middle" fill="#555">Skip step</text>

  <!-- Text input -->
  <rect x="297" y="734" width="816" height="34" rx="5" fill="#0c0c1c" stroke="#2a2a5a" stroke-width="1"/>
  <text x="313" y="755" font-size="12" fill="#888">Three main movements — the first is about...</text>
  <!-- Cursor -->
  <rect x="530" y="737" width="2" height="22" fill="#9999ee" opacity="0.8"/>

  <!-- Attach + send buttons -->
  <text x="1130" y="755" font-size="16" fill="#3a3a5a">⊕</text>
  <rect x="1148" y="736" width="40" height="30" rx="5" fill="#2a2a7a" stroke="#4444aa"/>
  <text x="1168" y="755" font-size="14" text-anchor="middle" fill="#9999ee">↑</text>

  <!-- Wireframe label -->
  <text x="700" y="756" font-size="10" text-anchor="middle" fill="#2a2a5a">WIREFRAME 06 — Agent Wizard (project setup via conversation)</text>

</svg>
