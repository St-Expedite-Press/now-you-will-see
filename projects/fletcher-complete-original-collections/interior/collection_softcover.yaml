title: "The Early Works of John Gould Fletcher"
subtitle: "The Five 1913 Books"
author: "John Gould Fletcher"
year: 2026
publisher: "St. Expedite Press"
isbn: ""
language: en
content_dir: ../manuscript/reading
output_dir: output/softcover
lualatex_path: lualatex
draft_mode: false

# Softcover (trade paperback) — 5.5 x 8.5 in perfect-bound
# IngramSpark paperback: minimum inner margin 0.875 in for 300–500 pp
# Smaller trim requires slightly tighter measure; compensate with 10.5pt body
render_config:
  fontsize: 10.5pt
  mainfont: Crimson Pro
  paperwidth: 5.5in
  paperheight: 8.5in
  top_margin: 0.875in
  bottom_margin: 0.875in
  inner_margin: 0.95in   # >IngramSpark floor for a thick perfect-bound book (gutter loss)
  outer_margin: 0.75in
  line_spread: 1.15
  stanza_skip: 1.2ex
  # Softcover packs poems (several short poems per page) to cut page count/cost.
  page_mode: flow
  poem_separation: '2.2\baselineskip'      # vertical gap between poems in flow mode
  # One-per-page knobs below are inert under flow mode; kept for parity with hardcover.
  short_poem_maxheight: '0.62\textheight'
  page_squeeze: '3\baselineskip'
